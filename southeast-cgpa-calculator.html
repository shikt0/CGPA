<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>South East University CGPA Calculator</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@3.2.2/dist/full.css" rel="stylesheet">
</head>

<body class="bg-gray-100 font-sans">

<!-- Banner -->
<header class="relative w-full h-44 md:h-60 overflow-hidden rounded-b-3xl shadow-lg">
  <img src="images/seu.jpg" class="w-full h-full object-cover">
  <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
    <h1 class="text-white text-2xl md:text-4xl font-bold text-center px-4">
      South East University CGPA Calculator
    </h1>
  </div>
</header>

<main class="max-w-5xl mx-auto mt-8 px-4">

<div class="mb-6 p-4 bg-gray-200 text-center rounded-lg shadow">
  Ad Space (728x90)
</div>

<div id="courses" class="space-y-4"></div>

<div class="flex flex-wrap gap-3 mt-6">
  <button class="btn btn-primary" onclick="addCourse()">+ Add Course</button>
  <button class="btn btn-success" onclick="calculateCGPA()">Calculate CGPA</button>
  <button class="btn btn-warning" onclick="saveSemester()">Save Semester</button>
  <button class="btn btn-accent" onclick="loadSemester()">Load Saved</button>
</div>

<div class="mt-6 p-6 bg-white shadow-xl rounded-xl">
  <h3 id="result" class="text-2xl font-bold text-indigo-700"></h3>
  <h4 id="credits" class="mt-2 text-lg"></h4>
  <h4 id="failWarning" class="mt-2 font-semibold"></h4>
</div>

<div class="mt-10 p-6 bg-gray-200 text-center rounded-lg shadow">
  Ad Space (336x280)
</div>

</main>

<footer class="footer bg-neutral text-neutral-content p-4 mt-10">
  <aside>
    <p>Copyright © <span id="year"></span> - All rights reserved</p>
  </aside>
</footer>

<script>
document.getElementById("year").innerText = new Date().getFullYear();

function addCourse() {
  const div = document.createElement("div");
  div.className = "card card-body bg-white shadow-lg rounded-xl flex flex-wrap gap-4";

  div.innerHTML = `
    <input placeholder="Course Name (Optional)" 
      class="input input-bordered w-full md:w-1/3">

    <input type="number" placeholder="Credit" 
      class="credit input input-bordered w-full md:w-1/6">

    <div class="w-full md:w-1/6 flex items-center gap-2">
      <input type="number" placeholder="Marks" 
        class="marks input input-bordered flex-1"
        oninput="detectLetter(this)">
      <span class="font-semibold text-indigo-700"></span>
    </div>

    <input type="number" placeholder="Retake Marks (Optional)" 
      class="retake input input-bordered w-full md:w-1/6">
  `;

  document.getElementById("courses").appendChild(div);
}

function detectLetter(input){
  const mark = parseFloat(input.value);
  const gp = gradeFromMarks(mark);
  input.nextElementSibling.innerText = mark ? "→ " + gradeToLetter(gp) : "";
}

function gradeToLetter(gp){
  const map={
    4.0:"A+",3.75:"A",3.5:"A-",
    3.25:"B+",3.0:"B",2.75:"B-",
    2.5:"C+",2.25:"C",2.0:"D",0.0:"F"
  };
  return map[gp] ?? "";
}

function gradeFromMarks(m){
  if(isNaN(m)) return 0;
  if(m>=80) return 4.0;
  if(m>=75) return 3.75;
  if(m>=70) return 3.5;
  if(m>=65) return 3.25;
  if(m>=60) return 3.0;
  if(m>=55) return 2.75;
  if(m>=50) return 2.5;
  if(m>=45) return 2.25;
  if(m>=40) return 2.0;
  return 0.0;
}

function calculateCGPA(){
  const credits=document.querySelectorAll(".credit");
  const marks=document.querySelectorAll(".marks");
  const retakes=document.querySelectorAll(".retake");

  let totalCredits=0,totalPoints=0,failCount=0,earnedCredits=0;

  for(let i=0;i<credits.length;i++){
    let credit=parseFloat(credits[i].value);
    let mark=parseFloat(marks[i].value);
    let retake=parseFloat(retakes[i].value);

    if(isNaN(credit)||isNaN(mark)) continue;

    let gpOriginal=gradeFromMarks(mark);
    let gpFinal=gpOriginal;

    if(!isNaN(retake)){
      let gpRetake=gradeFromMarks(retake);
      gpFinal=Math.max(gpOriginal,gpRetake);
    }

    if(gpFinal===0) failCount++;
    else earnedCredits+=credit;

    totalCredits+=credit;
    totalPoints+=credit*gpFinal;
  }

  if(totalCredits===0) return;

  document.getElementById("result").innerText =
    "CGPA: " + (totalPoints/totalCredits).toFixed(2);

  document.getElementById("credits").innerText =
    "Earned Credits: " + earnedCredits;

  const failEl=document.getElementById("failWarning");

  if(failCount>0){
    failEl.innerText="⚠ You have "+failCount+" failed course(s)";
    failEl.className="text-red-600 font-bold";
  } else {
    failEl.innerText="All courses passed ✔";
    failEl.className="text-green-600 font-bold";
  }
}

function saveSemester(){
  localStorage.setItem("seuCgpaData",
    document.getElementById("courses").innerHTML);
  alert("Semester Saved!");
}

function loadSemester(){
  document.getElementById("courses").innerHTML =
    localStorage.getItem("seuCgpaData") || "";
}

addCourse();
</script>

</body>
</html>
