<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIUB CGPA Calculator – Bangladesh</title>
<meta name="description" content="Premium AIUB CGPA Calculator with retake support, fail warnings, earned credits, and responsive design.">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@3.2.2/dist/full.css" rel="stylesheet">
</head>

<body class="bg-gray-100 font-sans">

<!-- Header -->
<header class="relative w-full h-40 md:h-56 overflow-hidden rounded-b-3xl shadow-lg">
  <img src="images/aiub.jpg" alt="AIUB Banner" class="w-full h-full object-cover">
  <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center">
    <h1 class="text-white text-2xl md:text-4xl font-bold">
      AIUB CGPA Calculator
    </h1>
  </div>
</header>

<!-- Main Section -->
<main class="relative max-w-5xl mx-auto mt-6 px-4">

  <!-- Background Texture -->
  <div class="absolute inset-0 bg-[url('images/222.png')] bg-cover bg-center opacity-10 rounded-3xl"></div>

  <!-- Content Wrapper -->
  <div class="relative space-y-6">

    <!-- Top Ad -->
    <div class="p-4 bg-gray-200 text-center rounded-lg shadow-lg">
      Ad Space (728x90)
    </div>

    <!-- Course Container -->
    <div id="courses" class="space-y-4"></div>

    <!-- Buttons -->
    <div class="flex flex-wrap gap-3">
      <button class="btn btn-primary btn-lg" onclick="addCourse()">+ Add Course</button>
      <button class="btn btn-success btn-lg" onclick="calculateCGPA()">Calculate CGPA</button>
      <button class="btn btn-warning btn-lg" onclick="saveSemester()">Save</button>
      <button class="btn btn-accent btn-lg" onclick="loadSemester()">Load</button>
    </div>

    <!-- Result Card -->
    <div class="p-6 bg-gray-50 shadow-xl rounded-xl">
      <h3 id="result" class="text-2xl font-bold text-indigo-700"></h3>
      <h4 id="credits" class="text-lg text-gray-700 mt-2"></h4>
      <h4 id="failWarning" class="mt-2 font-semibold"></h4>
    </div>

    <!-- Bottom Ad -->
    <div class="p-6 bg-gray-200 text-center rounded-lg shadow-lg">
      Ad Space (336x280)
    </div>

  </div>
</main>

<!-- Footer -->
<footer class="footer footer-center p-4 bg-neutral text-neutral-content mt-10">
  <aside>
    <p>Copyright © 2026 - All right reserved</p>
  </aside>
</footer>

<!-- JavaScript -->
<script>

function addCourse() {
  const div = document.createElement("div");
  div.className = "card card-body bg-white shadow-xl rounded-2xl flex flex-wrap gap-4";

  div.innerHTML = `
    <input placeholder="Course Name (Optional)" 
    class="input input-bordered w-full md:w-1/2">

    <input type="number" placeholder="Credit" 
    class="credit input input-bordered w-full md:w-1/6">

    <div class="w-full md:w-1/6 flex items-center gap-2">
      <input type="number" placeholder="Marks" 
      class="marks input input-bordered flex-1"
      oninput="detectLetter(this)">
      <span class="detected font-semibold text-indigo-700"></span>
    </div>

    <input type="number" placeholder="Retake Marks (Optional)" 
    class="retake input input-bordered w-full md:w-1/6">
  `;

  document.getElementById("courses").appendChild(div);
}

function gradeFromMarks(marks){
  if(marks>=90) return 4.0;
  if(marks>=85) return 3.7;
  if(marks>=80) return 3.3;
  if(marks>=75) return 3.0;
  if(marks>=70) return 2.7;
  if(marks>=65) return 2.3;
  if(marks>=60) return 2.0;
  return 0.0;
}

function gradeToLetter(gp){
  const map={
    4.0:"A+",
    3.7:"A-",
    3.3:"B+",
    3.0:"B",
    2.7:"B-",
    2.3:"C+",
    2.0:"C",
    0.0:"F"
  };
  return map[gp] ?? "";
}

function detectLetter(input){
  const mark = parseFloat(input.value);
  if(isNaN(mark)){
    input.nextElementSibling.innerText="";
    return;
  }
  const gp = gradeFromMarks(mark);
  input.nextElementSibling.innerText = " → " + gradeToLetter(gp);
}

function calculateCGPA(){
  const credits = document.querySelectorAll(".credit");
  const marks = document.querySelectorAll(".marks");
  const retakes = document.querySelectorAll(".retake");

  let totalCredits=0;
  let totalPoints=0;
  let failCount=0;
  let earnedCredits=0;

  for(let i=0;i<credits.length;i++){
    let credit=parseFloat(credits[i].value);
    let mark=parseFloat(marks[i].value);
    let retake=parseFloat(retakes[i].value);

    if(isNaN(credit)||isNaN(mark)) continue;

    let gpOriginal=gradeFromMarks(mark);
    let gpFinal=gpOriginal;

    if(!isNaN(retake)){
      let gpRetake=gradeFromMarks(retake);
      gpFinal=Math.max(gpOriginal,gpRetake);
    }

    if(gpFinal===0) failCount++;
    else earnedCredits+=credit;

    totalCredits+=credit;
    totalPoints+=credit*gpFinal;
  }

  if(totalCredits===0) return;

  document.getElementById("result").innerText=
    "CGPA: "+(totalPoints/totalCredits).toFixed(2);

  document.getElementById("credits").innerText=
    "Earned Credits: "+earnedCredits;

  const failEl=document.getElementById("failWarning");

  if(failCount>0){
    failEl.innerText="⚠ You still have "+failCount+" failed course(s).";
    failEl.className="text-red-600 font-bold";
  } else {
    failEl.innerText="All courses passed ✔";
    failEl.className="text-green-600 font-bold";
  }
}

function saveSemester(){
  localStorage.setItem("cgpaData",document.getElementById("courses").innerHTML);
  alert("Semester Saved!");
}

function loadSemester(){
  document.getElementById("courses").innerHTML=
    localStorage.getItem("cgpaData") || "";
}

addCourse();

</script>

</body>
</html>
