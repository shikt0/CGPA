<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>East West University CGPA Calculator – Bangladesh</title>
<meta name="description" content="Premium East West University CGPA Calculator with retake support, fail warnings, earned credits, and full-width inputs.">
<script src="https://cdn.tailwindcss.com"></script>
<script src="d.js"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@3.2.2/dist/full.css" rel="stylesheet">
</head>

<body class="bg-gray-100 font-sans">

<header class="relative w-full h-40 md:h-56 overflow-hidden rounded-b-3xl shadow-lg">
  <img src="images/ewu.jpg" class="w-full h-full object-cover">
  <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
    <h1 class="text-white text-2xl md:text-4xl font-bold text-center px-4">
      East West University CGPA Calculator
    </h1>
  </div>
</header>

<main class="relative max-w-5xl mx-auto mt-6 px-4">

  <!-- Premium Background -->
  <div class="absolute inset-0 bg-[url('images/222.png')] bg-cover bg-center opacity-20 rounded-3xl"></div>

  <div class="relative">

    <div class="mb-6 p-4 bg-gray-200 text-center rounded-lg shadow-lg">
      Ad Space (728x90)
    </div>
    <div class="card card-body bg-white shadow-xl rounded-2xl flex flex-wrap gap-4">
      <input placeholder="Course Name (Optional)" 
    class="input input-bordered w-full md:w-1/2">

    <input type="number" placeholder="Credit" 
    class="credit input input-bordered w-full md:w-1/6">

    <div class="w-full md:w-1/6 flex items-center gap-2">
      <input type="number" placeholder="Marks" 
      class="marks input input-bordered flex-1"
      oninput="detectLetter(this)">
      <span class="detected font-semibold text-indigo-700"></span>
    </div>

    <input type="number" placeholder="Retake Marks (Optional)" 
    class="retake input input-bordered w-full md:w-1/6">
    </div>

    <div id="courses" class="space-y-4"></div>

    <div class="flex flex-wrap gap-3 mt-6">
      <button class="btn btn-primary btn-lg" onclick="addCourse()">+ Add Course</button>
      <button class="btn btn-success btn-lg" onclick="calculateCGPA()">Calculate CGPA</button>
      <button class="btn btn-warning btn-lg" onclick="saveSemester()">Save Semester</button>
      <button class="btn btn-accent btn-lg" onclick="loadSemester()">Load Saved</button>
    </div>

    <div class="mt-6 p-6 bg-white shadow-xl rounded-xl">
      <h3 id="result" class="text-2xl font-bold text-indigo-700"></h3>
      <h4 id="credits" class="text-lg text-gray-700 mt-2"></h4>
      <h4 id="failWarning" class="mt-2 font-semibold"></h4>
    </div>

  </div>
</main>



<footer class="footer bg-neutral text-neutral-content items-center p-4 mt-10">
  <aside>
    <p>Copyright © <span id="year"></span> - All rights reserved</p>
  </aside>
</footer>

<script>
document.getElementById("year").innerText = new Date().getFullYear();
</script>

</body>
</html>
